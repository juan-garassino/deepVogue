apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: deepvogue-inference
  annotations:
    run.googleapis.com/launch-stage: BETA  # required for GPU nodeSelector
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/vpc-access-connector: deepvogue-vpc
        run.googleapis.com/vpc-access-egress: private-ranges-only
        run.googleapis.com/execution-environment: gen2
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
    spec:
      serviceAccountName: fastapi-inference-sa@PROJECT_ID.iam.gserviceaccount.com
      containerConcurrency: 1
      timeoutSeconds: 600
      containers:
        - image: europe-west1-docker.pkg.dev/PROJECT_ID/deepvogue/inference:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
          env:
            - name: DV_ARTIFACT_BACKEND
              value: gcs
            - name: DV_MODELS_YAML
              value: gs://deepvogue-models/models.yaml
            - name: DV_MODELS_ROOT
              value: gs://deepvogue-models
            - name: MLFLOW_TRACKING_URI
              value: https://deepvogue-mlflow-PROJECT_HASH-uc.a.run.app
          nodeSelector:
            run.googleapis.com/accelerator: nvidia-l4
