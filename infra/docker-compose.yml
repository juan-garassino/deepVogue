name: deepvogue-nano

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb -p local/deepvogue-models local/deepvogue-datasets local/deepvogue-walks local/deepvogue-mlflow || true;
      exit 0
      "

  mlflow:
    build:
      context: docker/mlflow
    environment:
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}
      MLFLOW_ARTIFACTS_DESTINATION: ${MLFLOW_ARTIFACTS_DESTINATION}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports: ["5000:5000"]

  prefect:
    build:
      context: ..
      dockerfile: infra/docker/prefect/Dockerfile
      args:
        TARGET: server
    environment:
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_SERVER_DATABASE_CONNECTION_URL: ${PREFECT_SERVER_DATABASE_CONNECTION_URL}
      PREFECT_API_URL: ${PREFECT_API_URL}
    depends_on:
      postgres:
        condition: service_healthy
    ports: ["4200:4200"]

  fastapi:
    build:
      context: ..
      dockerfile: infra/docker/inference/Dockerfile
    environment:
      DV_ARTIFACT_BACKEND: ${DV_ARTIFACT_BACKEND}
      DV_S3_ENDPOINT_URL: ${DV_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      DV_MODELS_YAML: ${DV_MODELS_YAML}
      DV_MODELS_ROOT: ${DV_MODELS_ROOT}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
    depends_on:
      mlflow:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    ports: ["8080:8080"]

volumes:
  pgdata:
  miniodata:
