name: build-train

on:
  workflow_dispatch:
  push:
    branches: [mlops/v1, master]
    paths:
      - 'infra/docker/train/**'
      - 'deepVogue/**'
      - 'requirements*.txt'
      - 'pyproject.toml'
      - '.github/workflows/build-train.yml'

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/deepvogue-train
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Lowercase image name
        id: img
        run: echo "image=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/train/Dockerfile
          push: true
          tags: |
            ${{ steps.img.outputs.image }}:${{ github.sha }}
            ${{ steps.img.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with: { payload: '{"text":":x: build-train failed"}' }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
