name: tests

on:
  push:
    branches: [master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install -e .
          pip install -r requirements-serve.txt -r requirements-orchestration.txt
          # CPU torch: the merged suite exercises legacy.py aliases, the stub
          # fixture builder, and the local backend — none need a GPU
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install pytest black
      - name: Build stub state dict
        run: python scripts/build_stub_state_dict.py
      - name: Lint
        run: black --check deepVogue tests
      - name: Test
        run: pytest -v -m "not gpu"
      - name: Notify Slack on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: '{"text":":x: tests failed on ${{ github.ref }} ${{ github.sha }} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      - name: Notify Telegram on failure
        if: failure()
        uses: ./.github/actions/notify-telegram
        with:
          text: "❌ tests failed on ${{ github.ref }} ${{ github.sha }} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
