name: Notify Telegram
description: >
  Send a message to a Telegram chat via Bot API. No-op when
  TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID is unset, so forks and PRs
  from contributors without the secrets stay green.

inputs:
  text:
    description: Message body. HTML-escaped automatically.
    required: true
  parse_mode:
    description: Telegram parse mode (HTML or MarkdownV2).
    required: false
    default: HTML

runs:
  using: composite
  steps:
    - shell: bash
      env:
        TELEGRAM_BOT_TOKEN: ${{ env.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ env.TELEGRAM_CHAT_ID }}
        TEXT: ${{ inputs.text }}
        PARSE_MODE: ${{ inputs.parse_mode }}
      run: |
        if [ -z "${TELEGRAM_BOT_TOKEN:-}" ] || [ -z "${TELEGRAM_CHAT_ID:-}" ]; then
          echo "TELEGRAM_BOT_TOKEN or TELEGRAM_CHAT_ID unset; skipping notify"
          exit 0
        fi
        ESCAPED=$(python3 -c "import html, sys; print(html.escape(sys.argv[1]))" "$TEXT")
        curl -sf -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "parse_mode=${PARSE_MODE}" \
          -d "disable_web_page_preview=true" \
          --data-urlencode "text=${ESCAPED}" \
          > /dev/null \
          || echo "telegram notify failed (non-fatal)"
